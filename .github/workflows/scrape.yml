name: Scraping quotidien Max It

on:
  schedule:
    # Tous les jours à 06h00 UTC (07h00 heure du Maroc en hiver, 08h00 en été).
    # Ajuste l'heure si besoin - format cron : minute heure jour mois jour_semaine
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Permet de lancer manuellement depuis l'onglet "Actions" de GitHub, pour tester

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dépendances Node (parse-play, app-store-scraper)
        run: |
          cd .node_helpers
          npm install

      - name: Appliquer le patch de secours sur parse-play
        run: |
          cd .node_helpers
          python patch_parse_play.py

      - name: Installer openpyxl
        run: pip install openpyxl

      - name: Lancer le scraping
        run: python maxit_tracker.py

      - name: Commiter et pousser le fichier Excel mis à jour
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add maxit_store_history.xlsx
          git diff --quiet --cached || git commit -m "Scraping automatique $(date -u +%Y-%m-%d)"
          git push

      - name: Publier le fichier Excel dans le dépôt de données public
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${DATA_REPO_TOKEN}@github.com/pdroquemaurel-stack/maxit-store-data.git data-repo
          cp maxit_store_history.xlsx data-repo/maxit_store_history.xlsx
          cd data-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add maxit_store_history.xlsx
          git diff --quiet --cached || git commit -m "Mise à jour automatique $(date -u +%Y-%m-%d)"
          git push
